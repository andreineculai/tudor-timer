<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Debug · Tudor's Billionth Second</title>
  <meta name="description" content="Debug controls for Tudor's billion-second birthday timer." />
  <link rel="stylesheet" href="styles.css?v=20260529-2" />
</head>
<body data-page="debug">
  <canvas id="fireworks" aria-hidden="true"></canvas>
  <div class="sky-layer" id="balloons" aria-hidden="true"></div>
  <div class="sky-layer" id="confetti" aria-hidden="true"></div>

  <main>
    <section class="card debug-card" aria-live="polite">
      <h1>Debug timer</h1>

      <div class="debug-panel">
        <button type="button" id="debugFive">Set milestone 5 seconds from now</button>
        <button type="button" id="debugCrossed">Pretend billion is already crossed</button>
        <button type="button" id="debugReset">Reset to real timer</button>
      </div>

      <div class="seconds-wrap simple-seconds-wrap">
        <div class="seconds" id="seconds">0</div>
      </div>

      <div class="celebration-actions always-visible" id="celebrationActions">
        <button type="button" data-burst="fireworks">More fireworks</button>
        <button type="button" data-burst="confetti">More confetti</button>
        <button type="button" data-burst="balloons">More balloons</button>
      </div>
    </section>
  </main>

  <script src="app.js?v=20260529-2"></script>
</body>
</html>
