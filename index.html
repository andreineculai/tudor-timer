<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tudor's Billionth Second</title>
  <meta name="description" content="A tiny billion-second birthday timer for Tudor." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="main">
  <canvas id="fireworks" aria-hidden="true"></canvas>
  <div class="sky-layer" id="balloons" aria-hidden="true"></div>
  <div class="sky-layer" id="confetti" aria-hidden="true"></div>

  <main>
    <section class="card main-card" aria-live="polite">
      <div class="eyebrow"><span class="pulse"></span><span id="status">Counting up</span></div>

      <h1>Tudor's billionth second</h1>

      <div class="timer simple-timer">
        <div class="seconds-wrap simple-seconds-wrap">
          <div class="seconds" id="seconds">0</div>
        </div>
      </div>

      <div class="celebration-actions" id="celebrationActions" hidden>
        <button type="button" data-burst="fireworks">More fireworks</button>
        <button type="button" data-burst="confetti">More confetti</button>
        <button type="button" data-burst="balloons">More balloons</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
